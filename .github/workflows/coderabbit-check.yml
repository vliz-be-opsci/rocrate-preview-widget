name: Require CodeRabbit Review
on: [pull_request]
permissions:
  pull-requests: write
  contents: read

jobs:
  check-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for CodeRabbit Review
        run: |
          # Fetch PR comments and check if @coderabbitai has posted a review summary
          COMMENTS=$(gh pr view $PR_NUMBER --json comments --jq '.comments[] | select(.author.login == "coderabbitai" or .author.login == "coderabbitai[bot]" or .author.login == "coderabbit[bot]") | .body')
          if [[ ! "$COMMENTS" =~ "Review summary" && ! "$COMMENTS" =~ "review summary" && ! "$COMMENTS" =~ "Review Summary" && ! "$COMMENTS" =~ "Review details" ]]; then
            echo "❌ CodeRabbit review required! Comment '@coderabbitai review' to trigger."
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}